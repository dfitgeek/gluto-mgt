<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LogiCore Admin - Supplier Management</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "background": "#f9f9ff",
                        "on-background": "#151c27",
                        "tertiary": "#22312c",
                        "secondary-fixed-dim": "#4edea3",
                        "surface-container-low": "#f0f3ff",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#002113",
                        "on-secondary-fixed-variant": "#005236",
                        "on-surface": "#151c27",
                        "tertiary-container": "#384742",
                        "surface-container-highest": "#dce2f3",
                        "error-container": "#ffdad6",
                        "outline": "#707974",
                        "on-tertiary-container": "#a4b5ae",
                        "surface-bright": "#f9f9ff",
                        "surface": "#f9f9ff",
                        "on-primary-container": "#80bea6",
                        "inverse-surface": "#2a313d",
                        "surface-container-high": "#e2e8f8",
                        "on-secondary-container": "#00714d",
                        "outline-variant": "#bfc9c3",
                        "on-primary-fixed": "#002117",
                        "on-tertiary": "#ffffff",
                        "secondary": "#006c49",
                        "on-primary-fixed-variant": "#0b513d",
                        "secondary-container": "#6cf8bb",
                        "primary": "#003527",
                        "surface-dim": "#d3daea",
                        "on-tertiary-fixed": "#101e1a",
                        "primary-fixed": "#b0f0d6",
                        "primary-container": "#064e3b",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-primary": "#95d3ba",
                        "on-primary": "#ffffff",
                        "surface-tint": "#2b6954",
                        "surface-container": "#e7eefe",
                        "tertiary-fixed-dim": "#bacac3",
                        "secondary-fixed": "#6ffbbe",
                        "inverse-on-surface": "#ebf1ff",
                        "on-tertiary-fixed-variant": "#3b4a44",
                        "on-surface-variant": "#404944",
                        "primary-fixed-dim": "#95d3ba",
                        "surface-variant": "#dce2f3",
                        "tertiary-fixed": "#d5e6df"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "stack-lg": "48px",
                        "base": "8px",
                        "stack-sm": "12px",
                        "container-padding": "32px",
                        "stack-md": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-md": ["Geist"],
                        "label-sm": ["Geist"],
                        "body-sm": ["Inter"],
                        "headline-md": ["Geist"],
                        "headline-lg": ["Geist"],
                        "body-lg": ["Inter"],
                        "headline-xl": ["Geist"],
                        "headline-lg-mobile": ["Geist"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .active-nav-indicator {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>

<body class="bg-background overflow-x-hidden font-body-md text-on-background antialiased">
    <!-- Side Navigation Bar (Anchored from JSON) -->
    <aside
        class="hidden top-0 left-0 z-50 fixed md:flex flex-col bg-surface-container-lowest py-stack-md border-r border-outline-variant w-[280px] h-screen">
        <div class="mb-stack-lg px-6">
            <h2 class="font-headline-md text-headline-md text-primary tracking-tight">Buyer Management</h2>
            <p class="font-body-sm text-body-sm text-on-surface-variant">Enterprise Portal</p>
        </div>
        <nav class="flex-1 space-y-1">
            <!-- Mapping labels based on User Request + JSON Blueprint -->
            <a class="group flex items-center gap-3 bg-secondary-container mx-2 my-1 px-4 py-3 rounded-lg font-semibold text-on-secondary-container transition-all"
                href="#">
                <span class="material-symbols-outlined active-nav-indicator">dashboard</span>
                <span class="font-label-md text-label-md">Dashboard</span>
            </a>
            <a class="group flex items-center gap-3 hover:bg-surface-container-high mx-2 my-1 px-4 py-3 rounded-lg text-on-surface-variant transition-all"
                href="#">
                <span class="material-symbols-outlined">pending_actions</span>
                <span class="font-label-md text-label-md">Unverified Supplier</span>
            </a>
            <a class="group flex items-center gap-3 hover:bg-surface-container-high mx-2 my-1 px-4 py-3 rounded-lg text-on-surface-variant transition-all"
                href="#">
                <span class="material-symbols-outlined">done_all</span>
                <span class="font-label-md text-label-md">Verified Suppliers</span>
            </a>
            <a class="group flex items-center gap-3 hover:bg-surface-container-high mx-2 my-1 px-4 py-3 rounded-lg text-on-surface-variant transition-all"
                href="#">
                <span class="material-symbols-outlined">person_add</span>
                <span class="font-label-md text-label-md">Create Supplier</span>
            </a>
            <div class="px-6 pt-stack-md">
                <div class="opacity-30 bg-outline-variant h-px"></div>
            </div>
            <!-- Extended menu items from JSON -->
            <a class="group flex items-center gap-3 hover:bg-surface-container-high mx-2 my-1 px-4 py-3 rounded-lg text-on-surface-variant transition-all"
                href="#">
                <span class="material-symbols-outlined">shopping_cart</span>
                <span class="font-label-md text-label-md">Orders</span>
            </a>
            <a class="group flex items-center gap-3 hover:bg-surface-container-high mx-2 my-1 px-4 py-3 rounded-lg text-on-surface-variant transition-all"
                href="#">
                <span class="material-symbols-outlined">receipt_long</span>
                <span class="font-label-md text-label-md">Invoices</span>
            </a>
        </nav>
        <div class="space-y-1 mt-auto px-4">
            <button
                class="flex justify-center items-center gap-2 bg-primary hover:bg-primary-container shadow-sm mb-stack-sm px-4 py-3 rounded-2xl w-full font-label-md text-white transition-colors">
                <span class="text-[20px] material-symbols-outlined">swap_horiz</span>
                Switch to Supplier
            </button>
            <a class="group flex items-center gap-3 hover:bg-surface-container-high my-1 px-4 py-3 rounded-lg text-on-surface-variant transition-all"
                href="#">
                <span class="material-symbols-outlined">help</span>
                <span class="font-label-md text-label-md">Support</span>
            </a>
            <a class="group flex items-center gap-3 hover:bg-surface-container-high my-1 px-4 py-3 rounded-lg text-error text-on-surface-variant transition-all"
                href="#">
                <span class="material-symbols-outlined">logout</span>
                <span class="font-label-md text-label-md">Logout</span>
            </a>
        </div>
    </aside>
  
    
   
</body>

</html>
